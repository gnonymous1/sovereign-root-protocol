<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP — Deployment Configuration Wizard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0b0e14;color:#c9d1d9;font-family:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#161b22}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
.app{display:flex;height:100vh;overflow:hidden}
.pane{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.pane-left{border-right:1px solid #21262d;min-width:520px}
.pane-right{min-width:380px}
@media(max-width:900px){.app{flex-direction:column}.pane-left,.pane-right{min-width:0;border-right:none;height:50vh}}
.pane-header{background:#161b22;border-bottom:1px solid #21262d;padding:8px 16px;font-size:12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;color:#8b949e;letter-spacing:.3px}
.pane-header .title{font-weight:600;color:#e6edf3}
.pane-header .badge{background:#1f6feb22;color:#58a6ff;padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid #1f6feb44}

/* --- Wizard Form ------------------------------------------------------- */
.wizard{flex:1;overflow-y:auto;padding:24px 32px;background:#0d1117}
.wizard h2{color:#e6edf3;font-size:16px;margin-bottom:4px;font-weight:600}
.wizard .step-indicator{display:flex;gap:6px;margin-bottom:24px}
.wizard .step-indicator .dot{width:32px;height:4px;border-radius:2px;background:#21262d;transition:background .3s}
.wizard .step-indicator .dot.active{background:#58a6ff}
.wizard .step-indicator .dot.done{background:#3fb950}
.wizard .step-desc{color:#8b949e;font-size:12px;margin-bottom:20px}
.wizard .form-group{margin-bottom:16px}
.wizard .form-group label{display:block;color:#e6edf3;font-size:12px;font-weight:600;margin-bottom:4px}
.wizard .form-group .hint{color:#8b949e;font-size:11px;margin-bottom:4px}
.wizard .form-group input,.wizard .form-group select{width:100%;padding:8px 12px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.wizard .form-group input:focus,.wizard .form-group select:focus{border-color:#58a6ff}
.wizard .form-group input.error{border-color:#f85149}
.wizard .form-row{display:flex;gap:12px}
.wizard .form-row .form-group{flex:1}
.wizard .btn-group{display:flex;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid #21262d}
.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:8px 18px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#30363d;border-color:#484f58}
.btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn.primary:hover{background:#388bfd}
.btn.success{background:#238636;border-color:#238636;color:#fff}
.btn.success:hover{background:#2ea043}
.btn.danger{background:#da3633;border-color:#da3633;color:#fff}
.btn.danger:hover{background:#f85149}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn .key{display:inline-block;background:#0d1117;padding:0 5px;border-radius:3px;font-size:10px;margin-left:4px;border:1px solid #484f58}

/* --- Peer list --------------------------------------------------------- */
.peer-list{margin-top:8px}
.peer-card{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.peer-card .peer-info{font-size:12px}
.peer-card .peer-info strong{color:#e6edf3}
.peer-card .peer-info span{color:#8b949e}
.peer-card .btn-remove{background:transparent;border:1px solid #f8514944;color:#f85149;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
.peer-card .btn-remove:hover{background:#f8514922}

/* --- Summary / Config Output ------------------------------------------- */
.config-preview{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:16px;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre;color:#7ee787;max-height:200px;overflow-y:auto;margin-top:16px}

/* --- Topology (right pane) --------------------------------------------- */
.topology{flex:1;display:flex;flex-direction:column;background:#0d1117;padding:16px;overflow:hidden}
.topology svg{width:100%;height:100%}
.node-box{cursor:default;transition:all .4s ease}
.node-box rect{transition:fill .5s ease,stroke .5s ease}
.node-box .label{font-size:11px;font-weight:600;fill:#e6edf3;text-anchor:middle;pointer-events:none}
.node-box .sublabel{font-size:9px;fill:#8b949e;text-anchor:middle;pointer-events:none}
.conn-line{stroke:#30363d;stroke-width:2;transition:stroke .5s ease}
.conn-line.active{stroke:#58a6ff;stroke-width:2.5;stroke-dasharray:8 4;animation:dash 1s linear infinite}
@keyframes dash{to{stroke-dashoffset:-24}}
.state-gray rect{fill:#21262d;stroke:#30363d}
.state-green rect{fill:#3fb95022;stroke:#3fb950}
.state-green .label{fill:#7ee787}
.state-green .sublabel{fill:#3fb950}
</style>
</head>
<body>

<div class="app">

  <!-- ================================================================ -->
  <!-- Left Pane: Wizard                                                  -->
  <!-- ================================================================ -->
  <div class="pane pane-left">
    <div class="pane-header">
      <span class="title">SRP Configuration Wizard</span>
      <span class="badge" id="wizardBadge">Step 1 of 5</span>
    </div>
    <div class="wizard" id="wizard"></div>
  </div>

  <!-- ================================================================ -->
  <!-- Right Pane: Topology                                               -->
  <!-- ================================================================ -->
  <div class="pane pane-right">
    <div class="pane-header">
      <span class="title">Deployment Topology</span>
      <span class="badge" id="topoStatus">Configuring</span>
    </div>
    <div class="topology" id="topology">
      <svg viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow-green"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <marker id="arrow-gray" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6" fill="#30363d"/></marker>
          <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6" fill="#58a6ff"/></marker>
        </defs>
        <line class="conn-line" id="conn12" x1="170" y1="160" x2="250" y2="160" marker-end="url(#arrow-gray)"/>
        <line class="conn-line" id="conn23" x1="330" y1="160" x2="410" y2="160" marker-end="url(#arrow-gray)"/>
        <line class="conn-line" id="conn31" x1="250" y1="200" x2="250" y2="250" marker-end="url(#arrow-gray)"/>
        <g class="node-box state-gray" id="node1" transform="translate(50,100)">
          <rect x="0" y="0" width="160" height="100" rx="8" stroke-width="2"/>
          <text class="label" x="80" y="35">Firewall Interceptor</text>
          <text class="label" x="80" y="52">eBPF / XDP</text>
          <text class="sublabel" x="80" y="72">packet filter</text>
          <text class="sublabel" x="80" y="87" id="topoPort1">port 9001</text>
        </g>
        <g class="node-box state-gray" id="node2" transform="translate(260,100)">
          <rect x="0" y="0" width="140" height="100" rx="8" stroke-width="2"/>
          <text class="label" x="70" y="35">Validation Proxy</text>
          <text class="label" x="70" y="52">Core Module 2</text>
          <text class="sublabel" x="70" y="72">all-MiniLM-L6-v2</text>
          <text class="sublabel" x="70" y="87" id="topoPort2">port 9000</text>
        </g>
        <g class="node-box state-gray" id="node3" transform="translate(420,100)">
          <rect x="0" y="0" width="80" height="100" rx="8" stroke-width="2"/>
          <text class="label" x="40" y="35">Cluster</text>
          <text class="label" x="40" y="52">Sync</text>
          <text class="label" x="40" y="69">Mesh</text>
          <text class="sublabel" x="40" y="87" id="topoPort3">port 9200</text>
        </g>
        <g transform="translate(10,310)">
          <rect x="0" y="0" width="14" height="14" rx="3" fill="#21262d" stroke="#30363d" stroke-width="2"/>
          <text x="20" y="12" fill="#8b949e" font-size="10">Standing By</text>
          <rect x="100" y="0" width="14" height="14" rx="3" fill="#3fb95022" stroke="#3fb950" stroke-width="2"/>
          <text x="120" y="12" fill="#8b949e" font-size="10">Configured</text>
        </g>
      </svg>
    </div>
  </div>

</div>

<script>
// =========================================================================
//  SRP Deployment Configuration Wizard
// =========================================================================

// --- State ---------------------------------------------------------------
const STATE = {
  node_id: 'srp-node-001',
  mode: 'software',
  interface: 'eth0',
  proxy_port: 9000,
  loader_port: 9001,
  sync_port: 9200,
  notify_port: 9201,
  tls_cert: 'cluster/certs/local.crt',
  tls_key: 'cluster/certs/local.key',
  tls_ca: 'cluster/certs/ca.crt',
  peers: [],
  upstream_providers: ['api.openai.com','api.anthropic.com','generativelanguage.googleapis.com','api.cohere.ai'],
};

let currentStep = 1;
const TOTAL_STEPS = 5;

// --- DOM refs ------------------------------------------------------------
const WIZ = document.getElementById('wizard');

function $(id) { return document.getElementById(id); }

// --- Topology helpers ----------------------------------------------------
function setNodeState(id, state) {
  const el = $(id);
  if (!el) return;
  el.classList.remove('state-gray','state-green');
  el.classList.add('state-' + state);
}
function setConnState(id, state) {
  const el = $(id);
  if (!el) return;
  el.classList.remove('active');
  if (state === 'active') el.classList.add('active');
}
function setTopoStatus(text, color) {
  const s = $('topoStatus');
  s.textContent = text;
  s.style.color = color || '#8b949e';
}
function updateTopoPorts() {
  const p1 = $('topoPort1'), p2 = $('topoPort2'), p3 = $('topoPort3');
  if (p1) p1.textContent = 'port ' + STATE.loader_port;
  if (p2) p2.textContent = 'port ' + STATE.proxy_port;
  if (p3) p3.textContent = 'port ' + STATE.sync_port;
}

// --- Step definitions ---------------------------------------------------
const STEPS = [
  {
    title: 'Node Identity',
    desc: 'Define your node name, deployment mode, and network interface.',
    render: function() {
      return `
        <div class="form-group">
          <label>Node ID</label>
          <div class="hint">Unique identifier for this SRP node in the cluster.</div>
          <input type="text" id="f_node_id" value="${STATE.node_id}" oninput="STATE.node_id=this.value">
        </div>
        <div class="form-group">
          <label>Deployment Mode</label>
          <div class="hint">Software mode uses eBPF/XDP; Hardware mode assumes dedicated appliance.</div>
          <select id="f_mode" onchange="STATE.mode=this.value;toggleInterface()">
            <option value="software" ${STATE.mode==='software'?'selected':''}>software — eBPF/XDP on host kernel</option>
            <option value="hardware" ${STATE.mode==='hardware'?'selected':''}>hardware — dedicated appliance</option>
          </select>
        </div>
        <div class="form-group" id="f_interface_group">
          <label>Network Interface</label>
          <div class="hint">The physical or virtual interface for XDP attachment.</div>
          <input type="text" id="f_interface" value="${STATE.interface}" oninput="STATE.interface=this.value">
        </div>`;
    },
    onEnter: function() {
      toggleInterface();
      setTopoStatus('Step 1: Identity','#58a6ff');
    }
  },
  {
    title: 'Service Ports',
    desc: 'Configure the TCP ports for each SRP subsystem.',
    render: function() {
      return `
        <div class="form-row">
          <div class="form-group">
            <label>Proxy Port</label>
            <div class="hint">Validation proxy HTTP endpoint.</div>
            <input type="number" min="1024" max="65535" id="f_proxy_port" value="${STATE.proxy_port}" oninput="STATE.proxy_port=+this.value;updateTopoPorts()">
          </div>
          <div class="form-group">
            <label>Loader Control Port</label>
            <div class="hint">eBPF loader control plane.</div>
            <input type="number" min="1024" max="65535" id="f_loader_port" value="${STATE.loader_port}" oninput="STATE.loader_port=+this.value;updateTopoPorts()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Sync Port</label>
            <div class="hint">mTLS cluster sync mesh.</div>
            <input type="number" min="1024" max="65535" id="f_sync_port" value="${STATE.sync_port}" oninput="STATE.sync_port=+this.value;updateTopoPorts()">
          </div>
          <div class="form-group">
            <label>Notify Port</label>
            <div class="hint">Sync heartbeat / notify HTTP endpoint.</div>
            <input type="number" min="1024" max="65535" id="f_notify_port" value="${STATE.notify_port}" oninput="STATE.notify_port=+this.value">
          </div>
        </div>`;
    },
    onEnter: function() {
      setTopoStatus('Step 2: Ports','#58a6ff');
    }
  },
  {
    title: 'TLS Certificates',
    desc: 'Configure mTLS certificate paths for secure cluster communication.',
    render: function() {
      return `
        <div class="form-group">
          <label>Certificate Paths — Node</label>
          <div class="hint">Relative to project root. Use auto-generated certs from cluster/certs/</div>
          <input type="text" id="f_tls_cert" value="${STATE.tls_cert}" oninput="STATE.tls_cert=this.value" placeholder="cluster/certs/local.crt">
        </div>
        <div class="form-group">
          <label>Certificate Paths — Key</label>
          <input type="text" id="f_tls_key" value="${STATE.tls_key}" oninput="STATE.tls_key=this.value" placeholder="cluster/certs/local.key">
        </div>
        <div class="form-group">
          <label>Certificate Paths — CA</label>
          <input type="text" id="f_tls_ca" value="${STATE.tls_ca}" oninput="STATE.tls_ca=this.value" placeholder="cluster/certs/ca.crt">
        </div>
        <div style="margin-top:12px;font-size:12px;color:#8b949e;background:#161b22;padding:10px 14px;border-radius:6px;border:1px solid #21262d">
          Tip: Run <strong style="color:#e6edf3">python3 cluster/generate_certs.py</strong> to auto-generate ECDSA P-256 certificates with 10-year validity.
        </div>`;
    },
    onEnter: function() {
      setTopoStatus('Step 3: TLS','#58a6ff');
    }
  },
  {
    title: 'Cluster Peers',
    desc: 'Add peer SRP nodes for state synchronization across the mesh.',
    render: function() {
      let peersHtml = '';
      STATE.peers.forEach(function(p, i) {
        peersHtml += `
          <div class="peer-card">
            <div class="peer-info">
              <strong>${p.node_id}</strong> &mdash;
              <span>${p.sync_host}:${p.sync_port} (sync) &bull; ${p.proxy_host}:${p.proxy_port} (proxy)</span>
            </div>
            <button class="btn-remove" onclick="removePeer(${i})">Remove</button>
          </div>`;
      });
      if (!STATE.peers.length) peersHtml = '<div style="color:#8b949e;font-size:12px;padding:8px 0">No peers configured yet.</div>';
      return `
        <div class="peer-list">${peersHtml}</div>
        <div style="margin-top:16px;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:6px">
          <div class="form-row">
            <div class="form-group">
              <label>Peer Node ID</label>
              <input type="text" id="f_peer_id" placeholder="srp-node-eu-west-01">
            </div>
            <div class="form-group">
              <label>Sync Host</label>
              <input type="text" id="f_peer_sync_host" placeholder="10.0.2.10">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Sync Port</label>
              <input type="number" id="f_peer_sync_port" value="9200">
            </div>
            <div class="form-group">
              <label>Proxy Port</label>
              <input type="number" id="f_peer_proxy_port" value="9000">
            </div>
          </div>
          <button class="btn" onclick="addPeer()" style="margin-top:8px">+ Add Peer</button>
        </div>`;
    },
    onEnter: function() {
      setTopoStatus('Step 4: Cluster','#58a6ff');
    }
  },
  {
    title: 'Review & Deploy',
    desc: 'Review your configuration. Generate srp-node.json or launch with Docker.',
    render: function() {
      const json = generateConfig();
      let peerSummary = STATE.peers.length + ' peer(s)';
      if (STATE.peers.length) peerSummary += ' (' + STATE.peers.map(function(p){return p.node_id}).join(', ') + ')';
      return `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px">
          <div style="background:#161b22;padding:12px;border-radius:6px;border:1px solid #30363d">
            <div style="color:#8b949e">Node ID</div>
            <div style="color:#e6edf3;font-weight:600">${STATE.node_id}</div>
          </div>
          <div style="background:#161b22;padding:12px;border-radius:6px;border:1px solid #30363d">
            <div style="color:#8b949e">Mode</div>
            <div style="color:#e6edf3;font-weight:600">${STATE.mode}</div>
          </div>
          <div style="background:#161b22;padding:12px;border-radius:6px;border:1px solid #30363d">
            <div style="color:#8b949e">Interface</div>
            <div style="color:#e6edf3;font-weight:600">${STATE.interface}</div>
          </div>
          <div style="background:#161b22;padding:12px;border-radius:6px;border:1px solid #30363d">
            <div style="color:#8b949e">Peers</div>
            <div style="color:#e6edf3;font-weight:600">${peerSummary}</div>
          </div>
          <div style="background:#161b22;padding:12px;border-radius:6px;border:1px solid #30363d">
            <div style="color:#8b949e">Proxy : Loader</div>
            <div style="color:#e6edf3;font-weight:600">${STATE.proxy_port} : ${STATE.loader_port}</div>
          </div>
          <div style="background:#161b22;padding:12px;border-radius:6px;border:1px solid #30363d">
            <div style="color:#8b949e">Sync : Notify</div>
            <div style="color:#e6edf3;font-weight:600">${STATE.sync_port} : ${STATE.notify_port}</div>
          </div>
        </div>
        <div class="config-preview">${json}</div>
        <div class="btn-group" style="border-top:none;padding-top:8px">
          <button class="btn" onclick="copyConfig()">Copy to Clipboard</button>
          <button class="btn" onclick="downloadConfig()">Download srp-node.json</button>
          <button class="btn success" onclick="deployDocker()">Deploy with Docker</button>
        </div>`;
    },
    onEnter: function() {
      setTopoStatus('Ready to Deploy','#3fb950');
      setNodeState('node1','green');
      setNodeState('node2','green');
      setNodeState('node3','green');
      setConnState('conn12','active');
      setConnState('conn23','active');
      setConnState('conn31','active');
    }
  }
];

// --- Helpers -------------------------------------------------------------
function toggleInterface() {
  const grp = $('f_interface_group');
  if (grp) grp.style.display = STATE.mode === 'software' ? 'block' : 'none';
}

function addPeer() {
  const id = $('f_peer_id'), sh = $('f_peer_sync_host');
  const sp = $('f_peer_sync_port'), pp = $('f_peer_proxy_port');
  if (!id.value || !sh.value) return;
  STATE.peers.push({
    node_id: id.value,
    sync_host: sh.value,
    sync_port: +sp.value,
    proxy_host: sh.value,
    proxy_port: +pp.value,
  });
  id.value = ''; sh.value = '';
  renderStep();
}

function removePeer(idx) {
  STATE.peers.splice(idx, 1);
  renderStep();
}

function generateConfig() {
  const cfg = {
    node_id: STATE.node_id,
    mode: STATE.mode,
    interface: STATE.interface,
    proxy_port: STATE.proxy_port,
    loader_port: STATE.loader_port,
    sync_port: STATE.sync_port,
    notify_port: STATE.notify_port,
    tls_cert: STATE.tls_cert,
    tls_key: STATE.tls_key,
    tls_ca: STATE.tls_ca,
    peers: STATE.peers,
    upstream_providers: STATE.upstream_providers,
  };
  return JSON.stringify(cfg, null, 2);
}

function copyConfig() {
  navigator.clipboard.writeText(generateConfig()).then(function() {
    const b = $('wizardBadge'); b.textContent = 'Copied!'; b.style.color = '#3fb950';
    setTimeout(function(){ b.textContent = 'Step ' + currentStep + ' of ' + TOTAL_STEPS; b.style.color = ''; }, 1500);
  });
}

function downloadConfig() {
  const blob = new Blob([generateConfig()], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'srp-node.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function deployDocker() {
  const json = encodeURIComponent(generateConfig());
  const cmd = [
    '# --- SRP Docker Deployment ---',
    '# 1. Save the config:',
    'cat > srp-node.json <<\'EOF\'',
    generateConfig(),
    'EOF',
    '',
    '# 2. Build and start:',
    'docker compose -f deploy/docker-compose.yml build',
    'docker compose -f deploy/docker-compose.yml up -d',
    '',
    '# 3. Check status:',
    'docker compose -f deploy/docker-compose.yml ps',
    '',
    '# 4. View logs:',
    'docker compose -f deploy/docker-compose.yml logs -f',
  ].join('\n');
  navigator.clipboard.writeText(cmd).then(function() {
    const b = $('wizardBadge');
    b.textContent = 'Docker commands copied!';
    b.style.color = '#3fb950';
    setTimeout(function(){ b.textContent = 'Step ' + currentStep + ' of ' + TOTAL_STEPS; b.style.color = ''; }, 2000);
  });
}

// --- Navigation ----------------------------------------------------------
function renderStep() {
  const step = STEPS[currentStep - 1];
  const isLast = currentStep === TOTAL_STEPS;

  // Step indicator dots
  let dots = '';
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const cls = i === currentStep ? 'active' : (i < currentStep ? 'done' : '');
    dots += '<div class="dot ' + cls + '"></div>';
  }

  let html = '<div class="step-indicator">' + dots + '</div>';
  html += '<h2>' + step.title + '</h2>';
  html += '<div class="step-desc">' + step.desc + '</div>';
  html += step.render();

  // Navigation buttons
  html += '<div class="btn-group">';
  if (currentStep > 1) html += '<button class="btn" onclick="goStep(' + (currentStep - 1) + ')">Back</button>';
  else html += '<div></div>';
  if (!isLast) html += '<button class="btn primary" onclick="goStep(' + (currentStep + 1) + ')">Next</button>';
  html += '</div>';

  WIZ.innerHTML = html;
  $('wizardBadge').textContent = 'Step ' + currentStep + ' of ' + TOTAL_STEPS;

  if (step.onEnter) step.onEnter();
}

function goStep(n) {
  currentStep = n;
  renderStep();
}

// --- Keyboard shortcuts --------------------------------------------------
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' && currentStep < TOTAL_STEPS) goStep(currentStep + 1);
  if (e.key === 'ArrowLeft' && currentStep > 1) goStep(currentStep - 1);
  if (e.key === 'r' || e.key === 'R') resetWizard();
});

function resetWizard() {
  Object.assign(STATE, {
    node_id: 'srp-node-001',
    mode: 'software',
    interface: 'eth0',
    proxy_port: 9000,
    loader_port: 9001,
    sync_port: 9200,
    notify_port: 9201,
    tls_cert: 'cluster/certs/local.crt',
    tls_key: 'cluster/certs/local.key',
    tls_ca: 'cluster/certs/ca.crt',
    peers: [],
    upstream_providers: ['api.openai.com','api.anthropic.com','generativelanguage.googleapis.com','api.cohere.ai'],
  });
  currentStep = 1;
  setNodeState('node1','gray');
  setNodeState('node2','gray');
  setNodeState('node3','gray');
  setConnState('conn12','');
  setConnState('conn23','');
  setConnState('conn31','');
  renderStep();
}

// --- Boot ----------------------------------------------------------------
renderStep();
</script>
