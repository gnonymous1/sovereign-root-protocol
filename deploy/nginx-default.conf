# =============================================================================
#  SRP Admin Console — Nginx Configuration
#  Serves the static frontend (Module 3) and proxies WebSocket connections
#  to the validation proxy (Module 2) on port 9000.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Root directory for the admin console static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/css application/javascript text/html application/json;
    gzip_min_length 256;
    gzip_vary on;

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Main admin dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket connections to the SRP proxy on port 9000
    # This allows the admin console JS to connect via ws://hostname/ws
    # without requiring a separate WebSocket port in the browser.
    location /ws {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
