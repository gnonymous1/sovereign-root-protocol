# =============================================================================
#  SOVEREIGN ROOT PROTOCOL (SRP) — DOCKER COMPOSE
# =============================================================================
#  Full-stack deployment: proxy, sync mesh, telemetry, frontend, loader.
#
#  Usage:
#    docker compose -f deploy/docker-compose.yml up -d
#    docker compose -f deploy/docker-compose.yml ps
#    docker compose -f deploy/docker-compose.yml logs -f
#
#  The eBPF/XDP loader (srp_loader.py) requires host kernel access
#  and is started as a privileged container with CAP_BPF. If your
#  kernel does not support eBPF, set PROFILE=software in .env.
# =============================================================================

services:

  # --------------------------------------------------------------------------
  #  Core Validation Proxy (Module 2)
  # --------------------------------------------------------------------------
  srp-proxy:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: srp-node:latest
    container_name: srp-proxy
    environment:
      SRP_ROLE: proxy
      SRP_PROXY_PORT: "9000"
      SRP_LOADER_PORT: "9001"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
    ports:
      - "9000:9000"
    volumes:
      - srp-model-cache:/opt/srp/model_cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  #  Cluster Sync Daemon (mTLS mesh)
  # --------------------------------------------------------------------------
  srp-sync:
    image: srp-node:latest
    container_name: srp-sync
    environment:
      SRP_ROLE: sync
      SRP_SYNC_PORT: "9200"
      SRP_NOTIFY_PORT: "9201"
    ports:
      - "9200:9200"
      - "9201:9201"
    volumes:
      - srp-sync-data:/opt/srp/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9201/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      srp-proxy:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  #  Telemetry — async log shipper + hash-chain ledger
  # --------------------------------------------------------------------------
  srp-telemetry:
    image: srp-node:latest
    container_name: srp-telemetry
    environment:
      SRP_ROLE: telemetry
    volumes:
      - srp-logs:/var/log/srp
      - srp-data:/var/run/srp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1993/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - srp-sync
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # --------------------------------------------------------------------------
  #  eBPF/XDP Loader (Module 1) — optional, host kernel required
  #  Set PROFILE=software in .env to skip this service.
  # --------------------------------------------------------------------------
  srp-loader:
    image: srp-node:latest
    container_name: srp-loader
    profile: hardware
    environment:
      SRP_ROLE: loader
      SRP_INTERFACE: ${SRP_INTERFACE:-eth0}
      LOADER_CONTROL_PORT: "9001"
    network_mode: "host"
    cap_add:
      - BPF
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - srp-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # --------------------------------------------------------------------------
  #  Admin Console Frontend (Module 3)
  # --------------------------------------------------------------------------
  srp-frontend:
    image: nginx:alpine
    container_name: srp-frontend
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      srp-proxy:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"


volumes:
  srp-model-cache:
  srp-sync-data:
  srp-logs:
  srp-data:
