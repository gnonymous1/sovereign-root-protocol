# =============================================================================
#  SOVEREIGN ROOT PROTOCOL (SRP) — KERNEL HARDENING PROFILE
# =============================================================================
#  Path: /etc/sysctl.d/99-srp-hardening.conf
#  Load: sysctl --system
#
#  Optimizes the Linux kernel for line-rate eBPF/XDP packet inspection,
#  zero-copy socket forwarding, and hardened network stack operation.
#
#  Architectural references:
#    - srp_filter.c     (eBPF/XDP kernel hook, sovereign_approval map)
#    - srp_loader.py    (BCC userspace loader with control plane)
#    - agents.md §1     (Al-Mir Sentry — line-rate DPI on port 443)
# =============================================================================


# ---------------------------------------------------------------------------
#  Section 1: BPF / eBPF Subsystem
# ---------------------------------------------------------------------------

# Enable BPF JIT compiler — translates BPF bytecode to native machine code,
# eliminating interpreter latency for XDP/tc hooks at line rate.
# 1 = enable for unprivileged users as well
net.core.bpf_jit_enable = 1

# Enable BPF JIT hardening — randomizes the JIT memory allocation address
# to mitigate JIT spray attacks against the eBPF verifier.
net.core.bpf_jit_harden = 1

# Enable BPF just-in-time compiler for kernel modules (kmods).
kernel.unprivileged_bpf_disabled = 1


# ---------------------------------------------------------------------------
#  Section 2: Network Stack — Buffer & Queue Optimization
# ---------------------------------------------------------------------------

# Maximum socket receive buffer (bytes) — required for zero-copy and
# high-throughput packet capture on the XDP/tc ingestion path.
# Default: 212992  |  SRP: 16 MB
net.core.rmem_max = 16777216

# Maximum socket send buffer (bytes).
net.core.wmem_max = 16777216

# Default initial socket buffer sizes:
#   min / default / max (bytes), space-separated triple
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# TCP socket buffer auto-tuning triple (min / default / max):
#   min=128KB, default=256KB, max=16MB
net.ipv4.tcp_rmem = 131072 262144 16777216
net.ipv4.tcp_wmem = 131072 262144 16777216

# Maximum number of packets queued on the input side of each network device.
# Higher values prevent drops during XDP burst processing.
# Default: 1000  |  SRP: 10000
net.core.netdev_max_backlog = 10000

# Maximum ancillary buffer headroom per-socket for packet metadata.
net.core.optmem_max = 65536


# ---------------------------------------------------------------------------
#  Section 3: IP Forwarding & Routing
# ---------------------------------------------------------------------------

# Enable IPv4 forwarding — required if the SRP gateway node acts as a
# transparent bridge between internal AI traffic and external upstream
# provider endpoints.
net.ipv4.ip_forward = 1

# Enable IPv6 forwarding (if IPv6 is in use on the network).
net.ipv6.conf.all.forwarding = 1

# Enable reverse-path filtering — drops packets arriving from an interface
# that do not have a matching route back to the source. Prevents IP spoofing.
# 1 = strict mode (based on the best route from the source)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable source route acceptance and forwarding.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Enable TCP Fast Open (TFO) for reduced latency on reconnects.
# 3 = enable both client and server roles
net.ipv4.tcp_fastopen = 3


# ---------------------------------------------------------------------------
#  Section 4: Connection Tracking & Conntrack
# ---------------------------------------------------------------------------

# Maximum connection tracking table size — the eBPF proxy may handle
# thousands of concurrent AI API connections.
net.netfilter.nf_conntrack_max = 1048576

# Timeout for established TCP connections in seconds.
# Default: 432000 (5 days)  |  SRP: 86400 (1 day) — faster table churn
net.netfilter.nf_conntrack_tcp_timeout_established = 86400


# ---------------------------------------------------------------------------
#  Section 5: TCP Stack Hardening
# ---------------------------------------------------------------------------

# Enable TCP Selective Acknowledgment (SACK) — improves throughput
# on lossy links. Disabling prevents certain SACK-based DoS attacks.
# Keep enabled for XDP environments where the NIC handles reassembly.
net.ipv4.tcp_sack = 1

# Enable Forward Acknowledgment (FACK) for TCP congestion control.
net.ipv4.tcp_fack = 1

# Enable TCP window scaling — required for high-latency/high-bandwidth links.
net.ipv4.tcp_window_scaling = 1

# Reduce the TIME_WAIT socket reuse timeout.
net.ipv4.tcp_fin_timeout = 15

# Enable reuse of TIME_WAIT sockets for new connections.
net.ipv4.tcp_tw_reuse = 1

# Set SYN backlog queue depth — high connection rate from multiple
# AI nodes requires a deep queue.
net.ipv4.tcp_max_syn_backlog = 8192

# Enable SYN cookies (defends against SYN flood DoS).
net.ipv4.tcp_syncookies = 1

# Disable TCP timestamps (reduces per-packet CPU overhead at line rate).
net.ipv4.tcp_timestamps = 0

# Enable TCP MTU probing for path MTU discovery.
net.ipv4.tcp_mtu_probing = 1


# ---------------------------------------------------------------------------
#  Section 6: Memory Management for Packet Processing
# ---------------------------------------------------------------------------

# Maximum number of memory map areas a process may have.
# BCC/eBPF programs and XDP maps consume significant mmap space.
vm.max_map_count = 262144

# Allow kernel to use up to N% of RAM for page cache / network buffers.
vm.vfs_cache_pressure = 100

# Swappiness — keep the kernel from swapping out long-running proxy tasks.
vm.swappiness = 10


# ---------------------------------------------------------------------------
#  Section 7: Security Hardening
# ---------------------------------------------------------------------------

# Restrict kernel pointer exposure in /proc — prevents KASLR bypass.
kernel.kptr_restrict = 2

# Restrict dmesg access to root only.
kernel.dmesg_restrict = 1

# Enable randomized virtual memory layout for kernel modules.
kernel.randomize_va_space = 2

# Disable SysRq — prevents physical console debugging access.
kernel.sysrq = 0

# Restrict core dumps to a dedicated directory.
fs.suid_dumpable = 0

# Disable ICMP redirect acceptance (prevents MITM routing attacks).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# Disable ICMP redirect sending.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore ICMP echo requests (optional — uncomment if desired).
# net.ipv4.icmp_echo_ignore_all = 1

# Ignore bogus ICMP error responses.
net.ipv4.icmp_ignore_bogus_error_responses = 1
