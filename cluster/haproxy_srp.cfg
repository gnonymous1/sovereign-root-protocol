# =============================================================================
#  SOVEREIGN ROOT PROTOCOL (SRP) — HAProxy ANYCAST LOAD-BALANCING FRAMEWORK
# =============================================================================
#  Version      : 2.8+ (LUA support optional)
#  Path         : /etc/haproxy/haproxy.cfg
#  Check syntax : haproxy -c -f /etc/haproxy/haproxy.cfg
#
#  Purpose:
#    Provides enterprise-grade Layer-4 (TCP) and Layer-7 (HTTP) load balancing
#    for the SRP multi-region proxy cluster. Incoming Intent Manifests from
#    peripheral software/hardware firewalls are distributed across healthy
#    proxy nodes with sub-millisecond failover and session stickiness based
#    on hardware Node ID.
#
#    Health checks (option httpchk GET /health) ensure that proxy nodes
#    lagging behind the cluster sync timeline are ejected immediately.
#
#  Architecture:
#    ┌──────────────┐    TCP/443 (or :8443)    ┌──────────────────┐
#    │  Peripheral  │ ──────────────────────>  │  HAProxy Frontend│
#    │  Firewall    │                          │  (anycast VIP)   │
#    └──────────────┘                          └────────┬─────────┘
#                                                       │
#                            ┌──────────────────────────┼──────────┐
#                            ▼                          ▼          ▼
#                    ┌──────────────┐          ┌──────────────┐
#                    │ srp-proxy-01 │  ......  │ srp-proxy-0N │
#                    │  us-east-1   │          │  eu-west-1   │
#                    └──────────────┘          └──────────────┘
#
#  References:
#    - agents.md §1 (Sentry — line-rate DPI, anycast ingress)
#    - workflow.md §1 Stage 2 (Transit — encapsulated tunnel routing)
#    - architecture.md §3 (Radial routing topology)
# =============================================================================

global
    # Process management
    daemon
    nbproc 1
    nbthread 4
    cpu-map auto

    # Maximum connections (tune per node resources)
    maxconn 65536

    # Hard memory limit (MB) — prevents OOM under spike load
    hard-stop-after 60m

    # SSL/TLS tuning
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tlsv12

    # Logging
    log stdout format raw local0 info
    log /dev/log local0 info

    # Statistical output
    stats socket ipv4@127.0.0.1:1993 level admin
    stats timeout 30s


# ============================================================================
#  Defaults
# ============================================================================
defaults
    mode                    tcp
    log                     global
    option                  dontlognull
    option                  redispatch
    option                  srvtcpka
    retries                 3
    timeout connect         5s
    timeout client          120s
    timeout server          120s
    timeout queue           30s
    timeout tunnel          3600s            # long-lived streaming connections
    timeout client-fin      30s
    maxconn                 65536
    default-server          inter 3s fall 3 rise 2 weight 100


# ============================================================================
#  Frontend: SRP Intent Manifest Ingestion (Anycast VIP)
# ============================================================================
#  Inbound TCP traffic from peripheral firewalls. Typically fronted by a
#  floating anycast VIP (e.g., 192.0.2.10) announced via BGP across regions.
#  Firewalls send their Intent Metadata Manifests as JSON HTTP POST bodies
#  to this endpoint.
# ============================================================================
frontend srp-ingress
    bind                    *:8443 name srp-tls
    bind                    *:8080 name srp-plain

    # Identify the protocol
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    # Log format with session metadata
    option                  tcplog
    log                     global

    # Default backend — routes to healthy proxy pool
    default_backend         srp-proxy-pool

    # Capture source address for stick-table keying
    capture request header X-Forwarded-For len 64

    # Rate limiting: max 5000 connections per source IP
    stick-table type ip size 256k expire 30s store conn_cur,conn_rate(10s)
    tcp-request connection reject if { src_conn_cur ge 5000 }
    tcp-request connection reject if { src_conn_rate ge 1000 }


# ============================================================================
#  Frontend: HAProxy Stats Dashboard (Admin Access)
# ============================================================================
frontend srp-stats
    bind                    *:8404 ssl crt /etc/haproxy/ssl/stats.pem
    mode                    http
    option                  httplog
    log                     global

    stats enable
    stats uri               /haproxy
    stats refresh           5s
    stats admin             if LOCALHOST
    stats auth              srpadmin:CHANGE_ME_PLEASE


# ============================================================================
#  Backend: SRP Proxy Cluster Pool
# ============================================================================
#  Points to the individual srp_proxy.py instances across the cluster.
#  Health checks use GET /health to verify liveness and sync status.
#  Servers are automatically disabled if they fail 3 consecutive checks.
# ============================================================================
backend srp-proxy-pool
    mode                    http

    # Health check — every 2 seconds, mark down after 3 failures
    option                  httpchk GET /health HTTP/1.0\r\nHost:\ srp
    http-check              expect status 200
    http-check              disable-on-404

    # Balance method: source IP hash for temporal session consistency
    balance                 source
    hash-type               consistent

    # Log health check state changes
    option                  log-health-checks

    # ---- Node 1: US East (Primary) ----
    server srp-node-us-east-01 10.0.1.10:9000 weight 100 check inter 2s fall 3 rise 2 \
        id 101
        # Sticky session by source IP — ensures the same firewall's
        # manifests reach the same proxy during a temporal window.
        # Stickiness expires after 35s (slightly longer than the 30s
        # sovereign key temporal window).
        cookie SRP_NODE insert indirect nocache

    # ---- Node 2: EU West (Secondary) ----
    server srp-node-eu-west-01 10.0.2.10:9000 weight 80 check inter 2s fall 3 rise 2 \
        id 102
        cookie SRP_NODE insert indirect nocache

    # ---- Node 3: AP Southeast (Tertiary) ----
    server srp-node-ap-southeast-01 10.0.3.10:9000 weight 60 check inter 2s fall 3 rise 2 \
        id 103
        cookie SRP_NODE insert indirect nocache

    # ---- Sticky session configuration ----
    # Hash the X-Node-ID header (sent by firewalls) to route all requests
    # from the same hardware node to the same proxy instance.
    stick-table type string len 128 size 256k expire 35s
    stick on hdr(X-Node-ID)

    # ---- Failover configuration ----
    # When a server goes down, redispatch after 3 retries to a live node.
    option                  redispatch
    retries                 3


# ============================================================================
#  Backend: Sync Daemon Health (for cross-cluster monitoring)
# ============================================================================
backend srp-sync-health
    mode                    http
    option                  httpchk GET /health HTTP/1.0\r\nHost:\ srp-sync
    http-check              expect status 200

    server srp-sync-us-east-01     127.0.0.1:9201 check inter 5s fall 3 rise 2 id 201
    server srp-sync-eu-west-01     10.0.2.10:9201 check inter 5s fall 3 rise 2 id 202
    server srp-sync-ap-southeast-01 10.0.3.10:9201 check inter 5s fall 3 rise 2 id 203


# ============================================================================
#  Listen: Cluster Health Aggregator (optional)
# ============================================================================
listen srp-cluster-health
    bind                    *:8500
    mode                    http
    option                  httplog

    # Aggregate health from all backends
    monitor-uri             /cluster/health
    monitor fail if { nbsrv(srp-proxy-pool) lt 1 }


# ============================================================================
#  Additional Tuning (commented by default, uncomment as needed)
# ============================================================================

